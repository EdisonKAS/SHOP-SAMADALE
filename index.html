<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>SHOP SAMADALE | Super Agent & Change</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
      /* Styles de base pour éviter le flash blanc au chargement */
      body {
        margin: 0;
        background-color: #0a0a0a;
        font-family: 'Inter', sans-serif;
        color: #ffffff;
        overflow-x: hidden;
      }

      /* Loader simple en attendant que React prenne le relais */
      #initial-loader {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #1a0a0a 0%, #0a0a0a 100%);
      }

      .logo-pulse {
        width: 80px;
        height: 80px;
        background: #dc2626;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        font-weight: 900;
        box-shadow: 0 0 30px rgba(220, 38, 38, 0.3);
        animation: pulse 1.5s infinite ease-in-out;
      }

      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="logo-pulse">S</div>
        <p style="margin-top: 20px; font-weight: 800; letter-spacing: 2px; color: #666; font-size: 12px; text-transform: uppercase;">
          Initialisation Samadale...
        </p>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
